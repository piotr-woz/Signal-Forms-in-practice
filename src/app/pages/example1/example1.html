<div class="min-h-screen bg-[#0d1117] text-white font-['Inter_Tight',sans-serif]">
  <div class="absolute inset-0 z-0" routerLink="/home"></div>

  <app-header />

  <div class="px-6 pt-26 pb-9">
    <mat-card appearance="outlined" class="relative z-10 max-w-xl mx-auto p-8 bg-[#445469]!">
      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="w-full mb-1">
          <mat-label for="firstName">First name</mat-label>
          <input [formField]="userForm.firstName" id="firstName" matInput type="text" placeholder="First name" />
          <mat-error app-form-error [control]="userForm.firstName()"></mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-full mb-1">
          <mat-label for="lastName">Last name</mat-label>
          <input [formField]="userForm.lastName" id="lastName" matInput type="text" placeholder="Last name" />
          <mat-error app-form-error [control]="userForm.lastName()"></mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-full mb-1">
          <mat-label for="phone">Phone number</mat-label>
          <input [formField]="userForm.phone" id="phone" matInput type="text" placeholder="Phone number" />
          <mat-error app-form-error [control]="userForm.phone()"></mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-full mb-1">
          <mat-label for="email">Email address</mat-label>
          <input [formField]="userForm.email" id="email" matInput type="email" placeholder="Email" />
          <mat-error app-form-error [control]="userForm.email()"></mat-error>
        </mat-form-field>

        <mat-checkbox [formField]="userForm.emailMarketing" type="checkbox">Email Marketing</mat-checkbox>

        <mat-form-field appearance="fill" class="w-full mb-1 mt-2">
          <mat-label for="password">Password</mat-label>
          <input [formField]="userForm.password" id="password" matInput type="password" placeholder="Password" />
          <mat-error app-form-error [control]="userForm.password()"></mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-full mb-1">
          <mat-label for="confirmPassword">Confirm Password</mat-label>
          <input [formField]="userForm.confirmPassword" id="confirmPassword" matInput type="password"
            placeholder="Confirm Password" />
          <mat-error app-form-error [control]="userForm.confirmPassword()"></mat-error>
        </mat-form-field>

        <div class="flex justify-end">
          <button matButton="tonal" class="mt-4" type="submit"
            [disabled]="userForm().invalid() || userForm().submitting()">
            {{userForm().submitting() ? 'Sending...' : 'Submit'}}
          </button>
        </div>
      </form>
    </mat-card>
  </div>
</div>
